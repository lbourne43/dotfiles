general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    path = ~/wallpaper.png
    blur_passes = 2
    blur_size = 6
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true

    outer_color = rgb(94e2d5)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)

    fade_on_empty = false
    placeholder_text = Password...

    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgb(cdd6f4)
    font_size = 70
    font_family = UbuntuMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A %d %B')"
    color = rgb(a6adc8)
    font_size = 22
    font_family = UbuntuMono Nerd Font

    position = 0, 50
    halign = center
    valign = center
}
